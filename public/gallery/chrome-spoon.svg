<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="#111418"/>
  <defs>
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#d0d8e0;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#e8ecf0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0b0c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chromeSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6080a0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Spoon body -->
  <path d="M80 120 Q150 80 220 150 Q150 220 80 180 Z" fill="url(#chromeGrad)"/>
  <!-- Chrome highlights -->
  <path d="M90 130 Q150 95 210 150" stroke="white" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M100 140 Q155 108 205 155" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Hook -->
  <line x1="80" y1="150" x2="60" y2="175" stroke="#888" stroke-width="2"/>
  <path d="M60 175 Q50 188 55 200" stroke="#888" stroke-width="2" fill="none"/>
  <!-- Split ring -->
  <circle cx="80" cy="150" r="5" fill="none" stroke="#aaa" stroke-width="2"/>
</svg>
