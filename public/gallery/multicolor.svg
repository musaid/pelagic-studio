<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="#0d1420"/>
  <defs>
    <linearGradient id="multiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e88e5;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#43a047;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#fb8c00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e91e63;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Lure body -->
  <ellipse cx="150" cy="150" rx="100" ry="35" fill="url(#multiGrad)"/>
  <!-- Skirt strands - mixed colors -->
  <g>
    <line x1="50" y1="150" x2="18" y2="130" stroke="#1e88e5" stroke-width="2.5"/>
    <line x1="50" y1="150" x2="14" y2="145" stroke="#43a047" stroke-width="2.5"/>
    <line x1="50" y1="150" x2="16" y2="160" stroke="#fb8c00" stroke-width="2.5"/>
    <line x1="50" y1="150" x2="20" y2="172" stroke="#e91e63" stroke-width="2.5"/>
    <line x1="50" y1="150" x2="12" y2="152" stroke="#26c6da" stroke-width="2"/>
    <line x1="50" y1="150" x2="18" y2="138" stroke="#ab47bc" stroke-width="2"/>
  </g>
  <!-- Eyes -->
  <circle cx="220" cy="143" r="7" fill="white"/>
  <circle cx="220" cy="143" r="4" fill="#1a1a2e"/>
  <circle cx="222" cy="141" r="1.5" fill="white"/>
  <!-- Highlight -->
  <ellipse cx="160" cy="140" rx="50" ry="10" fill="white" opacity="0.10"/>
</svg>
