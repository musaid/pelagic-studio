<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="#0a1628"/>
  <!-- Lure body - blue/silver -->
  <ellipse cx="150" cy="150" rx="100" ry="35" fill="url(#blueGrad)" rx="100" ry="35"/>
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c8d0;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a6e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Skirt strands -->
  <g opacity="0.85">
    <line x1="50" y1="150" x2="20" y2="130" stroke="#3b82f6" stroke-width="2"/>
    <line x1="50" y1="150" x2="18" y2="145" stroke="#60a5fa" stroke-width="2"/>
    <line x1="50" y1="150" x2="20" y2="160" stroke="#93c5fd" stroke-width="2"/>
    <line x1="50" y1="150" x2="22" y2="170" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="50" y1="150" x2="16" y2="152" stroke="#a5b4fc" stroke-width="1.5"/>
  </g>
  <!-- Eyes -->
  <circle cx="220" cy="143" r="7" fill="white"/>
  <circle cx="220" cy="143" r="4" fill="#1a1a2e"/>
  <circle cx="222" cy="141" r="1.5" fill="white"/>
  <!-- Highlight -->
  <ellipse cx="160" cy="140" rx="50" ry="10" fill="white" opacity="0.15"/>
  <!-- Hook hint -->
  <line x1="90" y1="165" x2="90" y2="190" stroke="#888" stroke-width="1.5"/>
  <path d="M90 190 Q100 200 95 210" stroke="#888" stroke-width="1.5" fill="none"/>
</svg>
