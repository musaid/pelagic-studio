<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="#1a0a08"/>
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e03020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b1a10;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Lure body - red/orange -->
  <ellipse cx="150" cy="150" rx="100" ry="35" fill="url(#redGrad)"/>
  <!-- Skirt strands -->
  <g opacity="0.9">
    <line x1="50" y1="150" x2="20" y2="128" stroke="#ff4500" stroke-width="2.5"/>
    <line x1="50" y1="150" x2="16" y2="144" stroke="#ff6600" stroke-width="2.5"/>
    <line x1="50" y1="150" x2="18" y2="160" stroke="#ff3300" stroke-width="2.5"/>
    <line x1="50" y1="150" x2="22" y2="172" stroke="#e05000" stroke-width="2"/>
    <line x1="50" y1="150" x2="14" y2="155" stroke="#ff7722" stroke-width="2"/>
    <line x1="50" y1="150" x2="20" y2="138" stroke="#cc3300" stroke-width="2"/>
  </g>
  <!-- Eyes -->
  <circle cx="220" cy="143" r="7" fill="white"/>
  <circle cx="220" cy="143" r="4" fill="#1a1a2e"/>
  <circle cx="222" cy="141" r="1.5" fill="white"/>
  <!-- Highlight -->
  <ellipse cx="160" cy="140" rx="50" ry="10" fill="white" opacity="0.12"/>
</svg>
